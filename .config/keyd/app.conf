# In terminals: use Ctrl+Shift variants so Super+C doesn't send SIGINT
[com.mitchellh.ghostty]
# Remap Super+C/V to Ctrl+Shift+C/V for proper clipboard handling
# This ensures paste works in all terminal apps (including OpenCode, Claude)
meta+c = C-S-c
meta+v = C-S-v
meta+t = C-S-t

[firefox]
meta+r = C-r

[chromium]
meta+r = C-r
